<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Siak Runners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .animated-bg { background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0f172a, #312e81); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .text-shine { background: linear-gradient(to right, #60a5fa 20%, #ffffff 40%, #ffffff 60%, #60a5fa 80%); background-size: 200% auto; color: #000; background-clip: text; text-fill-color: transparent; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-row { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    </style>
</head>
<body class="animated-bg text-gray-200 p-4 md:p-8 font-sans antialiased selection:bg-blue-500 selection:text-white">
    <div class="max-w-5xl mx-auto">
        <div class="glass-panel rounded-2xl mb-8 flex flex-col md:flex-row justify-between items-center p-6 gap-6 transition-all duration-300 hover:shadow-blue-900/20 hover:shadow-2xl">
            <div class="flex flex-row items-center gap-5 w-full md:w-auto">
                <div class="p-2 bg-white/90 backdrop-blur-md rounded-xl shadow-lg shrink-0 flex items-center justify-center transform transition hover:scale-105">
                    <img src="Logo SR.jpeg" alt="Logo SIAK RUNNERS" class="h-16 md:h-20 rounded object-contain" />
                </div>
                <div class="flex flex-col justify-center">
                    <h1 class="text-2xl md:text-4xl font-extrabold tracking-wider uppercase leading-tight drop-shadow-md">
                        LEADERBOARD<br />
                        <span class="text-shine">SIAK RUNNERS</span>
                    </h1>
                </div>
            </div>
            
            <div class="flex gap-8 w-full md:w-auto justify-start md:justify-end border-t md:border-t-0 border-gray-600 pt-4 md:pt-0">
                <div class="text-left md:text-right transform transition hover:scale-105">
                    <p class="text-xs text-blue-300 uppercase font-bold tracking-wider mb-1">Total Pelari</p>
                    <p id="stat-runners" class="text-3xl font-black text-white drop-shadow-lg">0</p>
                </div>
                <div class="text-left md:text-right transform transition hover:scale-105">
                    <p class="text-xs text-yellow-300 uppercase font-bold tracking-wider mb-1">Total Jarak</p>
                    <p id="stat-distance" class="text-3xl font-black text-white drop-shadow-lg">0 <span class="text-lg">km</span></p>
                </div>
            </div>
        </div>

        <div class="glass-panel p-5 rounded-2xl mb-6 flex flex-wrap gap-5 items-center justify-between">
            <div class="flex items-center gap-3">
                <label class="text-sm font-bold text-gray-300 uppercase tracking-wide">Tampilkan:</label>
                <select id="limit-filter" class="bg-gray-800/80 border border-blue-500/30 text-white text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none cursor-pointer transition hover:bg-gray-700/80">
                    <option value="10">Top 10</option>
                    <option value="30" selected>Top 30</option>
                    <option value="100">Semua Pelari</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                <span id="last-update" class="text-xs font-medium text-blue-200">Menarik data live dari Strava...</span>
            </div>
        </div>

        <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl">
            <div class="bg-gray-800/50 px-6 py-5 border-b border-gray-700/50 flex justify-between items-center">
                <h2 class="text-xl font-black text-white uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                    Klasemen Terkini
                </h2>
                <span class="text-xs font-extrabold px-3 py-1.5 bg-blue-600 text-white rounded-lg uppercase shadow-lg shadow-blue-500/30">Live Data</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-900/40 text-gray-400 uppercase text-xs tracking-widest border-b border-gray-700/50">
                        <tr>
                            <th class="px-6 py-5 text-center w-20 font-bold">Pos</th>
                            <th class="px-6 py-5 font-bold">Nama Pelari</th>
                            <th class="px-6 py-5 text-right font-bold">Total Jarak</th>
                            <th class="px-6 py-5 text-center font-bold">Aktivitas</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-gray-700/30">
                        <tr><td colspan="4" class="text-center py-16 text-gray-400 font-medium">Sedang mengambil 200 aktivitas terakhir...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="bg-gray-800/80 px-6 py-3 border-t border-gray-700/50 text-center text-xs text-gray-500">
                Menampilkan akumulasi jarak dari 200 aktivitas lari terbaru di Klub Strava.
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT YANG BARU DI BAWAH INI
        const API_URL = 'https://script.google.com/macros/s/AKfycbzA3qXmb1OAZY5m_aK-BINh1MAyiBozX7Nx_Qsc0MjU3KVzjOj2GTdF3kNEYAdIEBye/exec';
        
        let globalRawData = []; 

        document.getElementById('limit-filter').addEventListener('change', processData);

        async function fetchStravaData() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.status === "error") throw new Error(result.message);
                
                globalRawData = result.data;
                document.getElementById('last-update').innerText = "Live / Sinkron ( " + new Date().toLocaleTimeString('id-ID') + " )";
                processData(); 

            } catch (error) {
                document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="4" class="text-center py-16 text-red-400 font-medium bg-red-900/10">Gagal terhubung ke Strava: ${error.message}</td></tr>`;
                document.getElementById('last-update').innerText = "Koneksi Terputus";
                document.querySelector('.animate-ping').classList.remove('bg-blue-400');
                document.querySelector('.animate-ping').classList.add('bg-red-400');
            }
        }

        function processData() {
            const limit = parseInt(document.getElementById('limit-filter').value);
            let leaderboard = {};
            let totalOverallDistance = 0;

            globalRawData.forEach(act => {
                if (!leaderboard[act.name]) {
                    leaderboard[act.name] = { name: act.name, distance: 0, runs: 0 };
                }
                leaderboard[act.name].distance += act.distance;
                leaderboard[act.name].runs += 1;
                totalOverallDistance += act.distance;
            });

            const sortedRunners = Object.keys(leaderboard)
                .map(key => leaderboard[key])
                .sort((a, b) => b.distance - a.distance)
                .slice(0, limit);

            document.getElementById('stat-runners').innerText = sortedRunners.length;
            document.getElementById('stat-distance').innerHTML = `${totalOverallDistance.toFixed(1)} <span class="text-lg text-yellow-500">km</span>`;

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (sortedRunners.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-16 text-gray-400 italic">Belum ada data lari.</td></tr>`;
                return;
            }

            sortedRunners.forEach((runner, index) => {
                let rank = index + 1;
                let rankVisual = `<span class="text-gray-400 font-black text-lg">${rank}</span>`;
                
                if (rank === 1) rankVisual = `<div class="bg-yellow-400/20 text-yellow-400 w-10 h-10 rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(250,204,21,0.5)]"><span class="text-2xl" title="Juara 1">🥇</span></div>`;
                if (rank === 2) rankVisual = `<div class="bg-gray-300/20 text-gray-300 w-10 h-10 rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(209,213,219,0.3)]"><span class="text-2xl" title="Juara 2">🥈</span></div>`;
                if (rank === 3) rankVisual = `<div class="bg-orange-400/20 text-orange-400 w-10 h-10 rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(251,146,60,0.3)]"><span class="text-2xl" title="Juara 3">🥉</span></div>`;

                let delay = index * 0.05;

                tbody.innerHTML += `
                    <tr class="fade-in-row hover:bg-white/5 transition-colors duration-300" style="animation-delay: ${delay}s">
                        <td class="px-6 py-4 text-center">${rankVisual}</td>
                        <td class="px-6 py-4 font-bold text-gray-100 text-base tracking-wide">${runner.name}</td>
                        <td class="px-6 py-4 text-right"><span class="text-blue-400 font-black tracking-wider text-xl">${runner.distance.toFixed(2)}</span></td>
                        <td class="px-6 py-4 text-center text-gray-400 font-medium"><span class="bg-gray-800 border border-gray-600 px-3 py-1 rounded-full text-xs">${runner.runs}x Lari</span></td>
                    </tr>`;
            });
        }
        fetchStravaData();
    </script>
</body>
</html>
