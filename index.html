<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Siak Runners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .animated-bg { background: linear-gradient(-45deg, #0f172a, #111827, #0f172a, #1e3a8a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        
        .text-shine-white { background: linear-gradient(to right, #f3f4f6 20%, #ffffff 40%, #ffffff 60%, #f3f4f6 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        .text-pulse-red { color: #dc2626; text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); animation: pulseRed 2s infinite; }
        
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes pulseRed { 0%, 100% { text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); opacity: 1; } 50% { text-shadow: 0 0 25px rgba(220, 38, 38, 0.9); opacity: 0.8; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-row { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    </style>
</head>
<body class="animated-bg text-gray-200 p-3 md:p-8 font-sans antialiased selection:bg-red-500 selection:text-white">
    <div class="max-w-5xl mx-auto">
        <div class="glass-panel rounded-2xl mb-6 md:mb-8 flex flex-col md:flex-row justify-between items-center p-5 md:p-6 gap-5 transition-all duration-300 hover:shadow-red-900/10 hover:shadow-2xl">
            
            <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto text-center md:text-left">
                <div class="p-2 bg-white/95 backdrop-blur-md rounded-xl shadow-lg shrink-0 flex items-center justify-center transform transition hover:scale-105">
                    <img src="Logo SR.jpeg" alt="Logo SIAK RUNNERS" class="h-14 md:h-20 rounded object-contain" />
                </div>
                <div class="flex flex-col justify-center">
                    <h1 class="text-xl md:text-4xl font-extrabold tracking-wider uppercase leading-tight drop-shadow-md text-gray-300 mt-2 md:mt-0">
                        LEADERBOARD BULANAN<br />
                        <span class="text-shine-white">SIAK</span> <span class="text-pulse-red">RUNNERS</span>
                    </h1>
                </div>
            </div>
            
            <div class="flex flex-col w-full md:w-auto items-center md:items-end border-t md:border-t-0 border-gray-700/80 pt-5 md:pt-0 mt-2 md:mt-0">
                <div class="text-center md:text-right transform transition hover:scale-105">
                    <p class="text-[10px] md:text-xs text-yellow-400 uppercase font-bold tracking-widest mb-1">Total Jarak</p>
                    <p id="stat-distance" class="text-3xl md:text-4xl font-black text-white drop-shadow-lg tracking-tight">0 <span class="text-lg md:text-xl text-gray-400 font-bold">km</span></p>
                </div>
            </div>
        </div>

        <div class="glass-panel p-4 md:p-5 rounded-2xl mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex items-center gap-3 w-full md:w-auto justify-center md:justify-start">
                <label class="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-widest">Tampilkan:</label>
                <select id="limit-filter" class="bg-gray-800/90 border border-gray-600 text-white text-sm rounded-xl focus:ring-red-500 focus:border-red-500 block p-2 outline-none cursor-pointer transition hover:bg-gray-700">
                    <option value="10">Top 10</option>
                    <option value="30" selected>Top 30</option>
                    <option value="100">Semua Pelari</option>
                </select>
            </div>
            <div class="flex items-center gap-3 bg-gray-900/50 px-4 py-2 rounded-full border border-gray-700/50 w-full md:w-auto justify-center">
                <span class="relative flex h-2.5 w-2.5 md:h-3 md:w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 md:h-3 md:w-3 bg-blue-500"></span>
                </span>
                <span id="last-update" class="text-[10px] md:text-xs font-semibold text-blue-300 tracking-wide">Menghubungkan API...</span>
            </div>
        </div>

        <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl">
            <div class="bg-gray-900/80 px-4 md:px-6 py-4 md:py-5 border-b border-gray-700/50 flex justify-between items-center">
                <h2 class="text-sm md:text-xl font-black text-white uppercase tracking-widest flex items-center gap-2 md:gap-3">
                    <svg class="w-5 h-5 md:w-6 md:h-6 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                    Klasemen Resmi
                </h2>
                <span id="period-label" class="text-[10px] md:text-xs font-black px-2 md:px-3 py-1 md:py-1.5 bg-blue-600/90 text-white rounded-lg uppercase shadow-lg shadow-blue-900/50 border border-blue-500/30 tracking-wider">Bulan Ini</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-xs md:text-sm text-left">
                    <thead class="bg-gray-950/50 text-gray-500 uppercase text-[10px] md:text-xs tracking-widest border-b border-gray-800 whitespace-nowrap">
                        <tr>
                            <th class="px-4 py-3 md:px-6 md:py-5 text-center w-12 md:w-20 font-bold">Pos</th>
                            <th class="px-4 py-3 md:px-6 md:py-5 font-bold">Nama Pelari</th>
                            <th class="px-4 py-3 md:px-6 md:py-5 text-right font-bold">Total Jarak</th>
                            <th class="px-4 py-3 md:px-6 md:py-5 text-center font-bold">Aktivitas</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-gray-800/60">
                        <tr><td colspan="4" class="text-center py-12 md:py-20 text-gray-500 font-medium text-sm md:text-base tracking-wide animate-pulse">Menarik data dari Strava...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN KEMBALI URL GOOGLE APPS SCRIPT ANDA DI BAWAH INI
        const API_URL = 'https://script.google.com/macros/s/AKfycbwGfmYzLb508lOj1pS-KnNvUFeno2nUrE0uE2nvLBx6QXY5_YJQ9J3uz04dPW7r2NLV/exec';
        
        let globalRawData = []; 
        document.getElementById('limit-filter').addEventListener('change', renderTable);

        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const now = new Date();
        document.getElementById('period-label').innerText = `${months[now.getMonth()]} ${now.getFullYear()}`;

        async function fetchStravaData() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.status === "error") throw new Error(result.message);
                
                globalRawData = result.data; 
                document.getElementById('last-update').innerText = "Live ( " + new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) + " )";
                renderTable(); 

            } catch (error) {
                document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="4" class="text-center py-16 text-red-400 font-medium bg-red-900/10 text-xs md:text-base">Gagal terhubung ke API: ${error.message}</td></tr>`;
                document.getElementById('last-update').innerText = "Terputus";
                document.querySelector('.animate-ping').classList.remove('bg-blue-400');
                document.querySelector('.animate-ping').classList.add('bg-red-500');
            }
        }

        function renderTable() {
            const limit = parseInt(document.getElementById('limit-filter').value);
            const limitedData = globalRawData.slice(0, limit);
            
            let totalDistance = 0;
            globalRawData.forEach(r => totalDistance += r.distance);

            document.getElementById('stat-distance').innerHTML = `${totalDistance.toFixed(1)} <span class="text-lg md:text-xl text-yellow-500 font-bold">km</span>`;

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (limitedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-12 md:py-20 text-gray-500 italic text-sm md:text-base">Belum ada aktivitas lari bulan ini.</td></tr>`;
                return;
            }

            limitedData.forEach((runner, index) => {
                let rank = index + 1;
                let rankVisual = `<span class="text-gray-500 font-black text-lg md:text-xl">${rank}</span>`;
                
                if (rank === 1) rankVisual = `<div class="bg-yellow-500/20 text-yellow-400 w-8 h-8 md:w-11 md:h-11 rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(234,179,8,0.4)] border border-yellow-500/30"><span class="text-lg md:text-2xl" title="Juara 1">🥇</span></div>`;
                if (rank === 2) rankVisual = `<div class="bg-gray-400/20 text-gray-300 w-8 h-8 md:w-11 md:h-11 rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(156,163,175,0.3)] border border-gray-400/30"><span class="text-lg md:text-2xl" title="Juara 2">🥈</span></div>`;
                if (rank === 3) rankVisual = `<div class="bg-orange-500/20 text-orange-400 w-8 h-8 md:w-11 md:h-11 rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(249,115,22,0.3)] border border-orange-500/30"><span class="text-lg md:text-2xl" title="Juara 3">🥉</span></div>`;

                let delay = index * 0.05;

                tbody.innerHTML += `
                    <tr class="fade-in-row hover:bg-gray-800/50 transition-colors duration-300 group whitespace-nowrap" style="animation-delay: ${delay}s">
                        <td class="px-4 py-3 md:px-6 md:py-4 text-center">${rankVisual}</td>
                        <td class="px-4 py-3 md:px-6 md:py-4 font-bold text-gray-100 text-xs md:text-base tracking-wide group-hover:text-white transition-colors">${runner.name}</td>
                        <td class="px-4 py-3 md:px-6 md:py-4 text-right"><span class="text-blue-400 font-black tracking-wider text-sm md:text-xl group-hover:text-blue-300 transition-colors">${runner.distance.toFixed(2)}</span></td>
                        <td class="px-4 py-3 md:px-6 md:py-4 text-center text-gray-400 font-medium">
                            <span class="bg-gray-900 border border-gray-700 px-3 md:px-4 py-1 md:py-1.5 rounded-full text-[10px] md:text-xs tracking-wider group-hover:border-gray-500 transition-colors">${runner.runs}x</span>
                        </td>
                    </tr>`;
            });
        }
        
        fetchStravaData();
    </script>
</body>
</html>
