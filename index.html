<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siak Runners</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 p-4 md:p-8 font-sans antialiased selection:bg-blue-500 selection:text-white">
    <div class="max-w-5xl mx-auto">
        
        <div class="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-gray-700 pb-6 gap-6">
            
            <div class="flex flex-row items-center gap-4 w-full md:w-auto">
                <div class="p-2 bg-white rounded-xl shadow-lg shrink-0 flex items-center justify-center">
                    <img src="Logo SR.jpeg" alt="Logo SIAK RUNNERS" class="h-16 md:h-20 rounded object-contain" />
                </div>
                
                <div class="flex flex-col justify-center">
                    <h1 class="text-2xl md:text-4xl font-extrabold text-white tracking-wider uppercase leading-tight drop-shadow-md">
                        LEADERBOARD<br />
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-500">SIAK RUNNERS</span>
                    </h1>
                </div>
            </div>
            
            <div class="flex gap-6 w-full md:w-auto justify-start md:justify-end border-t md:border-t-0 border-gray-700 pt-4 md:pt-0">
                <div class="text-left md:text-right">
                    <p class="text-xs text-gray-500 uppercase font-semibold">Total Pelari</p>
                    <p id="stat-runners" class="text-xl font-bold text-blue-400">0</p>
                </div>
                <div class="text-left md:text-right">
                    <p class="text-xs text-gray-500 uppercase font-semibold">Total Jarak</p>
                    <p id="stat-distance" class="text-xl font-bold text-yellow-400">0 km</p>
                </div>
            </div>
            
        </div>

        <div class="bg-gray-800 p-4 rounded-xl mb-6 flex flex-wrap gap-4 items-center border border-gray-700 shadow-lg">
            <div class="flex items-center gap-3">
                <label class="text-sm font-medium text-gray-400">Waktu:</label>
                <select id="time-filter" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer">
                    <option value="harian">Harian (Hari Ini)</option>
                    <option value="mingguan">Mingguan (7 Hari Terakhir)</option>
                    <option value="bulanan" selected>Bulan Ini</option>
                    <option value="bulan_lalu">Bulan Lalu</option>
                </select>
            </div>
            <div class="flex items-center gap-3">
                <label class="text-sm font-medium text-gray-400">Tampilkan:</label>
                <select id="limit-filter" class="bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer">
                    <option value="10">Top 10</option>
                    <option value="30" selected>Top 30</option>
                    <option value="100">Semua</option>
                </select>
            </div>
            <div class="ml-auto">
                <span id="last-update" class="text-xs text-gray-400 bg-gray-700 px-3 py-1 rounded-full">Memuat database...</span>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-xl">
            <div class="bg-gray-850 px-6 py-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-lg font-bold text-white">Klasemen Akhir</h2>
                <span id="period-label" class="text-xs font-semibold px-2 py-1 bg-blue-900/50 text-blue-300 rounded">Bulan Ini</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-800 text-gray-400 uppercase text-xs tracking-wider border-b border-gray-700">
                        <tr>
                            <th class="px-6 py-4 text-center w-16">Pos</th>
                            <th class="px-6 py-4">Nama Pelari</th>
                            <th class="px-6 py-4 text-right">Total Jarak</th>
                            <th class="px-6 py-4 text-center">Aktivitas</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-gray-700/50">
                        <tr><td colspan="4" class="text-center py-12 text-gray-500">Menghubungkan ke Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN KEMBALI URL GOOGLE APPS SCRIPT SPREADSHEET (DATABASE) ANDA DI SINI
        const API_URL = 'https://script.google.com/macros/s/AKfycbzRYGypiA-GSOwv62s_u6DjPfm30xGy4zBMI1dXe_9QI3RvbyYQG8WeE1STsHbrYWJ8/exec';
        
        let globalRawData = []; 

        document.getElementById('time-filter').addEventListener('change', processData);
        document.getElementById('limit-filter').addEventListener('change', processData);

        async function fetchStravaData() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.status === "error") throw new Error(result.message);
                
                globalRawData = result.data;
                document.getElementById('last-update').innerText = "Update: " + new Date().toLocaleTimeString('id-ID');
                processData(); 
            } catch (error) {
                document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="4" class="text-center py-10 text-red-400">Gagal terhubung ke Database: ${error.message}</td></tr>`;
            }
        }

        function processData() {
            const timeFilter = document.getElementById('time-filter').value;
            const limit = parseInt(document.getElementById('limit-filter').value);
            const now = new Date();
            
            const labels = { 
                'harian': 'Hari Ini', 
                'mingguan': '7 Hari Terakhir', 
                'bulanan': 'Bulan Ini',
                'bulan_lalu': 'Bulan Lalu'
            };
            document.getElementById('period-label').innerText = labels[timeFilter];

            let filteredActivities = globalRawData.filter(activity => {
                const actDate = new Date(activity.date);
                if (timeFilter === 'harian') {
                    return actDate.toDateString() === now.toDateString();
                } else if (timeFilter === 'mingguan') {
                    const sevenDaysAgo = new Date(now.getTime() - (7 * 24 * 60 * 60 * 1000));
                    return actDate >= sevenDaysAgo;
                } else if (timeFilter === 'bulanan') {
                    return actDate.getMonth() === now.getMonth() && actDate.getFullYear() === now.getFullYear();
                } else if (timeFilter === 'bulan_lalu') {
                    let lastMonth = now.getMonth() - 1;
                    let year = now.getFullYear();
                    if (lastMonth < 0) { 
                        lastMonth = 11; 
                        year -= 1; 
                    }
                    return actDate.getMonth() === lastMonth && actDate.getFullYear() === year;
                }
                return false; 
            });

            let leaderboard = {};
            let totalOverallDistance = 0;

            filteredActivities.forEach(act => {
                if (!leaderboard[act.name]) {
                    leaderboard[act.name] = { name: act.name, distance: 0, runs: 0 };
                }
                leaderboard[act.name].distance += act.distance;
                leaderboard[act.name].runs += 1;
                totalOverallDistance += act.distance;
            });

            const sortedRunners = Object.keys(leaderboard)
                .map(key => leaderboard[key])
                .sort((a, b) => b.distance - a.distance)
                .slice(0, limit);

            document.getElementById('stat-runners').innerText = sortedRunners.length;
            document.getElementById('stat-distance').innerText = totalOverallDistance.toFixed(1) + " km";

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (sortedRunners.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-12 text-gray-500">Tidak ada aktivitas pada periode ini.</td></tr>`;
                return;
            }

            sortedRunners.forEach((runner, index) => {
                let rank = index + 1;
                let rankVisual = `<span class="text-gray-400 font-bold">${rank}</span>`;
                
                if (rank === 1) rankVisual = `<span class="text-xl" title="Juara 1">🥇</span>`;
                if (rank === 2) rankVisual = `<span class="text-xl" title="Juara 2">🥈</span>`;
                if (rank === 3) rankVisual = `<span class="text-xl" title="Juara 3">🥉</span>`;

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-700/50 transition-colors">
                        <td class="px-6 py-4 text-center">${rankVisual}</td>
                        <td class="px-6 py-4 font-medium text-gray-100">${runner.name}</td>
                        <td class="px-6 py-4 text-right text-blue-400 font-bold tracking-wide">${runner.distance.toFixed(2)}</td>
                        <td class="px-6 py-4 text-center text-gray-400">${runner.runs}</td>
                    </tr>
                `;
            });
        }

        fetchStravaData();
    </script>
</body>
</html>
