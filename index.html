<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Siak Runners</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 p-4 md:p-8 font-sans antialiased">
    <div class="max-w-5xl mx-auto">
        
        <div class="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-gray-700 pb-6 gap-6">
            <div class="flex flex-row items-center gap-4 w-full md:w-auto">
                <div class="p-2 bg-white rounded-xl shadow-lg shrink-0">
                    <img src="Logo SR.jpeg" alt="Logo Siak Runners" class="h-16 md:h-20 rounded object-contain" />
                </div>
                <div>
                    <h1 class="text-2xl md:text-4xl font-extrabold text-white uppercase leading-tight">
                        LEADERBOARD<br />
                        <span class="text-blue-500">SIAK RUNNERS</span>
                    </h1>
                </div>
            </div>
            
            <div class="flex gap-6 w-full md:w-auto justify-start md:justify-end border-t md:border-t-0 border-gray-700 pt-4 md:pt-0">
                <div class="text-right">
                    <p class="text-xs text-gray-500 uppercase font-semibold">Total Pelari</p>
                    <p id="stat-runners" class="text-xl font-bold text-blue-400">0</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500 uppercase font-semibold">Total Jarak</p>
                    <p id="stat-distance" class="text-xl font-bold text-yellow-400">0 km</p>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl mb-6 flex flex-wrap gap-4 items-center border border-gray-700">
            <div class="flex items-center gap-3">
                <label class="text-sm text-gray-400">Periode:</label>
                <select id="time-filter" class="bg-gray-700 text-white text-sm rounded-lg p-2 outline-none cursor-pointer">
                    <option value="harian">Hari Ini</option>
                    <option value="mingguan">7 Hari Terakhir</option>
                    <option value="bulanan" selected>Bulan Ini</option>
                    <option value="bulan_lalu">Bulan Lalu</option>
                </select>
            </div>
            <div class="ml-auto">
                <span id="last-update" class="text-xs text-gray-400 bg-gray-700 px-3 py-1 rounded-full">Sinkronisasi Database...</span>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-2xl">
            <div class="px-6 py-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="font-bold text-white uppercase tracking-wider">Peringkat Pelari</h2>
                <span id="period-label" class="text-xs font-bold px-2 py-1 bg-blue-900 text-blue-200 rounded uppercase">Bulan Ini</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-800 text-gray-400 uppercase text-xs border-b border-gray-700">
                        <tr>
                            <th class="px-6 py-4 text-center w-16">Pos</th>
                            <th class="px-6 py-4">Nama Pelari</th>
                            <th class="px-6 py-4 text-right">Jarak (KM)</th>
                            <th class="px-6 py-4 text-center">Aktivitas</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-gray-700/50">
                        <tr><td colspan="4" class="text-center py-12 text-gray-500">Menghubungkan ke Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT SPREADSHEET (DATABASE) ANDA DI SINI
        const API_URL = 'https://script.google.com/macros/s/AKfycbzRYGypiA-GSOwv62s_u6DjPfm30xGy4zBMI1dXe_9QI3RvbyYQG8WeE1STsHbrYWJ8/exec';
        
        let globalRawData = []; 

        document.getElementById('time-filter').addEventListener('change', processData);

        async function fetchDatabase() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if (result.status === "error") throw new Error(result.message);
                globalRawData = result.data;
                document.getElementById('last-update').innerText = "Data Ter-update";
                processData(); 
            } catch (error) {
                document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="4" class="text-center py-10 text-red-400">Gagal Memuat Database.</td></tr>`;
            }
        }

        function processData() {
            const timeFilter = document.getElementById('time-filter').value;
            const now = new Date();
            
            const labels = { 'harian': 'Hari Ini', 'mingguan': '7 Hari Terakhir', 'bulanan': 'Bulan Ini', 'bulan_lalu': 'Bulan Lalu' };
            document.getElementById('period-label').innerText = labels[timeFilter];

            let filtered = globalRawData.filter(act => {
                const actDate = new Date(act.date);
                if (timeFilter === 'harian') return actDate.toDateString() === now.toDateString();
                if (timeFilter === 'mingguan') return actDate >= new Date(now.getTime() - (7 * 24 * 60 * 60 * 1000));
                if (timeFilter === 'bulanan') return actDate.getMonth() === now.getMonth() && actDate.getFullYear() === now.getFullYear();
                if (timeFilter === 'bulan_lalu') {
                    let m = now.getMonth() - 1; let y = now.getFullYear();
                    if (m < 0) { m = 11; y -= 1; }
                    return actDate.getMonth() === m && actDate.getFullYear() === y;
                }
                return false;
            });

            let leaderboard = {};
            let totalDist = 0;

            filtered.forEach(act => {
                if (!leaderboard[act.name]) leaderboard[act.name] = { name: act.name, distance: 0, runs: 0 };
                leaderboard[act.name].distance += act.distance;
                leaderboard[act.name].runs += 1;
                totalDist += act.distance;
            });

            const sorted = Object.keys(leaderboard).map(k => leaderboard[k]).sort((a, b) => b.distance - a.distance);

            document.getElementById('stat-runners').innerText = sorted.length;
            document.getElementById('stat-distance').innerText = totalDist.toFixed(1) + " km";

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = sorted.length ? '' : '<tr><td colspan="4" class="text-center py-12 text-gray-500">Tidak ada aktivitas di periode ini.</td></tr>';

            sorted.forEach((runner, index) => {
                let rank = index + 1;
                let visual = rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : `<span class="text-gray-500 font-bold">${rank}</span>`;
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-700/50 transition-colors">
                        <td class="px-6 py-4 text-center">${visual}</td>
                        <td class="px-6 py-4 font-semibold text-gray-100">${runner.name}</td>
                        <td class="px-6 py-4 text-right text-blue-400 font-bold">${runner.distance.toFixed(2)}</td>
                        <td class="px-6 py-4 text-center text-gray-400">${runner.runs}x</td>
                    </tr>`;
            });
        }

        fetchDatabase();
    </script>
</body>
</html>
